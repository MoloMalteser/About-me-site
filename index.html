<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marlin | Uncensored</title>
    
    <style>
        :root {
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --accent: #6366f1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050508;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* --- TOPBAR --- */
        .topbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 1000;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-weight: 900;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- NAVIGATION --- */
        .navbar {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 300px;
            background: rgba(5, 5, 8, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1);
            z-index: 999;
        }

        .navbar.active { top: 0; padding-top: 70px; }
        .navbar a { color: #fff; text-decoration: none; font-size: 1.5rem; font-weight: 700; }

        /* --- BURGER --- */
        .burger { cursor: pointer; z-index: 1001; }
        .burger span { display: block; width: 30px; height: 2px; background: #fff; margin: 6px 0; transition: 0.3s; }

        /* --- CONTENT SECTIONS --- */
        main { position: relative; z-index: 1; }
        
        section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .glass-card {
            border: 1px solid var(--glass-border);
            padding: 4rem;
            border-radius: 32px;
            text-align: center;
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.02);
        }

        h1 { font-size: clamp(2.5rem, 10vw, 6rem); font-weight: 800; line-height: 1; }
        p { margin-top: 20px; font-size: 1.2rem; color: #888; }

        /* --- liquidGL LENS (FIXED) --- */
        .liquid-lens {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            height: 60vh;
            border-radius: 40px;
            z-index: 500;
            pointer-events: none; /* Wichtig: Man muss durch das Glas klicken können */
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0; /* Wird via JS eingeblendet */
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo">Marlin</div>
        <div class="burger" id="burger">
            <span></span><span></span><span></span>
        </div>
    </div>

    <nav class="navbar" id="nav">
        <a href="#home">Home</a>
        <a href="#projects">Projects</a>
        <a href="#socials">Socials</a>
    </nav>

    <main>
        <section id="home">
            <div class="glass-card scroll-reveal">
                <h1>Hey 👋</h1>
                <p>Willkommen in meiner Welt.</p>
            </div>
        </section>

        <section>
            <div class="glass-card scroll-reveal">
                <h1>Marlin</h1>
                <p>Mobile App Developer & Student</p>
            </div>
        </section>

        <section id="projects">
            <div class="glass-card scroll-reveal">
                <h1>Swift & Dart</h1>
                <p>Ich baue native Erlebnisse.</p>
            </div>
        </section>

        <section id="socials">
            <div class="glass-card scroll-reveal">
                <h1>Let's Talk</h1>
                <p>@uncensored</p>
            </div>
        </section>
    </main>

    <div class="liquid-lens"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
    <script src="/scripts/html2canvas.min.js"></script>
    <script src="/scripts/liquidGL.js"></script>

    <script>
        // Navigation Logic
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav');
        burger.onclick = () => nav.classList.toggle('active');

        // GSAP Scroll Reveals
        gsap.registerPlugin(ScrollTrigger);
        document.querySelectorAll('.scroll-reveal').forEach((card) => {
            gsap.from(card, {
                scrollTrigger: {
                    trigger: card,
                    start: "top 90%",
                    end: "top 10%",
                    toggleActions: "play reverse play reverse"
                },
                opacity: 0,
                y: 100,
                filter: "blur(10px)",
                duration: 1.2,
                ease: "expo.out"
            });
        });

        // liquidGL Initialisierung
        window.addEventListener('DOMContentLoaded', () => {
            const effect = liquidGL({
                target: ".liquid-lens",
                snapshot: "main",      // Er nimmt den Inhalt von <main> für die Brechung
                refraction: 0.04,     // Etwas stärker für den "Lens"-Look
                bevelDepth: 0.15,
                bevelWidth: 0.1,
                frost: 0.1,           // Nur minimale Trübung für maximale Schärfe
                shadow: true,
                specular: true,
                tilt: true,           // Das Glas reagiert leicht auf die Maus
                tiltFactor: 5,
                on: {
                    init: (intro) => {
                        gsap.to(intro.el, {
                            opacity: 1,
                            duration: 1.5,
                            ease: "power2.inOut"
                        });
                    }
                }
            });

            // Dynamische Registrierung: Wichtig für flüssige Refraktion beim Scrollen
            liquidGL.registerDynamic(".glass-card");
            liquidGL.syncWith(); 
        });
    </script>
</body>
</html>
