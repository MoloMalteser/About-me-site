<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS Watch Clone | Marlin</title>
    
    <style>
        :root {
            --ios-bg: #000000;
            --ios-grey: #1c1c1e;
            --ios-text: #ffffff;
            --ios-subtext: #8e8e93;
            --ios-accent: #ff9f0a; /* Watch App Orange */
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            overflow-x: hidden;
            height: 100%;
        }

        /* --- HEADER AREA --- */
        .header {
            padding: 60px 16px 20px;
            background: var(--ios-bg);
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .search-bar {
            background: #1c1c1e;
            border-radius: 10px;
            padding: 8px 12px;
            margin-top: 15px;
            color: var(--ios-subtext);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- LIST STYLE (iOS Settings Look) --- */
        .settings-group {
            background: var(--ios-grey);
            border-radius: 10px;
            margin: 20px 16px;
            overflow: hidden;
        }

        .settings-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 15px;
            border-bottom: 0.5px solid #38383a;
            cursor: pointer;
        }

        .settings-item:last-child { border-bottom: none; }
        .settings-item:active { background-color: #3a3a3c; }

        .icon-box {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .label { flex: 1; font-size: 17px; }
        .chevron { color: #3a3a3c; font-weight: bold; }

        /* --- TABBAR (LiquidGL Target) --- */
        .tabbar-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 400px;
            z-index: 9999;
        }

        #ios-tabbar {
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 0.5px solid var(--glass-border);
            border-radius: 35px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 8px 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--ios-subtext);
            text-decoration: none;
            transition: color 0.2s;
        }

        .tab-item.active { color: var(--ios-accent); }

        .tab-icon {
            font-size: 22px;
            margin-bottom: 2px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tab-label { font-size: 10px; font-weight: 500; }

        /* Jiggle / Elastic Animation */
        .jiggle .tab-icon {
            animation: spring 0.5s ease-in-out;
        }

        @keyframes spring {
            0% { transform: scale(1) translateY(0); }
            30% { transform: scale(1.4) translateY(-8px); }
            50% { transform: scale(0.9) translateY(2px); }
            100% { transform: scale(1) translateY(0); }
        }

        /* Hintergrund Blobs für LiquidGL Brechung */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 80% 20%, #2c1a05 0%, #000 60%);
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="header">
        <h1>Marlin's Watch</h1>
        <div class="search-bar">🔍 Einstellungen durchsuchen</div>
    </div>

    <div class="settings-group">
        <div class="settings-item">
            <div class="icon-box" style="background: #ff3b30;">🔔</div>
            <div class="label">Mitteilungen</div>
            <div class="chevron">›</div>
        </div>
        <div class="settings-item">
            <div class="icon-box" style="background: #ff9500;">⌚</div>
            <div class="label">App-Ansicht</div>
            <div class="chevron">›</div>
        </div>
        <div class="settings-item">
            <div class="icon-box" style="background: #8e8e93;">⚙️</div>
            <div class="label">Allgemein</div>
            <div class="chevron">›</div>
        </div>
    </div>

    <div class="settings-group">
        <div class="settings-item">
            <div class="icon-box" style="background: #007aff;">✨</div>
            <div class="label">Anzeige & Helligkeit</div>
            <div class="chevron">›</div>
        </div>
    </div>

    <div class="tabbar-container">
        <nav id="ios-tabbar">
            <div class="tab-item active" onclick="triggerTab(this)">
                <div class="tab-icon">⌚</div>
                <div class="tab-label">Meine Uhr</div>
            </div>
            <div class="tab-item" onclick="triggerTab(this)">
                <div class="tab-icon">🎨</div>
                <div class="tab-label">Zifferblätter</div>
            </div>
            <div class="tab-item" onclick="triggerTab(this)">
                <div class="tab-icon">🧭</div>
                <div class="tab-label">Entdecken</div>
            </div>
        </nav>
    </div>

    <script src="/scripts/html2canvas.min.js"></script>
    <script src="/scripts/liquidGL.js"></script>

    <script>
        // Tab Logik & Animation
        function triggerTab(el) {
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
                item.classList.remove('jiggle');
            });
            el.classList.add('active');
            el.classList.add('jiggle');
            
            // Haptik-Simulation (Vibration falls unterstützt)
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        // LiquidGL Initialisierung (1:1 iOS Glas-Look)
        window.addEventListener('load', () => {
            setTimeout(() => {
                liquidGL({
                    target: "#ios-tabbar",
                    snapshot: "body",      // Er nimmt alles dahinter für die Brechung
                    refraction: 0.03,      // iOS-typische leichte Brechung
                    frost: 0.15,           // Edles Milchglas-Finish
                    bevelWidth: 0.1,
                    bevelDepth: 0.08,
                    shadow: true,
                    specular: true,        // Für das Licht-Highlight auf dem Glas
                    tilt: true,            // Reagiert auf Neigung/Maus
                    tiltFactor: 8
                });
            }, 500);
        });
    </script>
</body>
</html>
