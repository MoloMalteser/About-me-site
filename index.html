<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquidGL | Bio-Premium Pro</title>
    
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #6366f1;
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden; /* Scrollen passiert im Container */
        }

        /* 1. TOP NAVBAR */
        .top-nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 1000;
            background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border); box-sizing: border-box;
        }
        .logo { height: 30px; }

        /* 2. LAYOUT: LINKS CONTENT, RECHTS LOGIN/INFO */
        .split-layout { display: flex; width: 100%; height: 100vh; padding-top: 60px; }
        
        #left-col { 
            width: 50%; height: calc(100vh - 60px); 
            overflow-y: auto; scrollbar-width: none; 
            position: relative;
        }
        #left-col::-webkit-scrollbar { display: none; }

        .right-col { 
            width: 50%; height: 100%; 
            background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center;
        }

        /* 3. DAS ZENTRALE GLAS-VIERECK (Fixiert im linken Bereich) */
        .glass-anchor {
            position: fixed; top: 60px; left: 0; width: 50%; height: calc(100vh - 60px);
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; z-index: 500; mix-blend-mode: difference;
        }

        .bio-card-glass {
            width: 360px; height: 480px; border-radius: 30px;
            border: 1px solid var(--glass-border);
            pointer-events: auto; display: flex; flex-direction: column;
            padding: 30px; box-sizing: border-box; text-align: center;
        }

        /* 4. BOTTOM TABBAR MIT JIGGLE */
        .bottom-tabs {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            padding: 10px 20px; border-radius: 50px;
            display: flex; gap: 20px; z-index: 600;
        }

        .tab-item {
            cursor: pointer; font-size: 20px; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Jiggle Animation */
        .jiggle { animation: jiggle-anim 0.4s ease-in-out; }
        @keyframes jiggle-anim {
            0% { transform: scale(1); }
            30% { transform: scale(1.3) rotate(10deg); }
            60% { transform: scale(0.9) rotate(-10deg); }
            100% { transform: scale(1); }
        }

        /* Background Elements */
        .content-img { width: 100%; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <img src="/assets/ndlogo.svg" class="logo" alt="Logo">
        <div style="font-size: 12px; font-weight: bold; letter-spacing: 2px;">PREMIUM ACCESS</div>
        <div style="width: 30px;"></div>
    </nav>

    <div class="split-layout">
        <div id="left-col">
            <img src="/assets/liquid-bkg-_0000_Comp-33.webp" class="content-img">
            <img src="/assets/liquid-bkg-_0001_Comp-183.webp" class="content-img">
            <img src="/assets/liquid-bkg-_0002_Comp-163.webp" class="content-img">

            <div class="glass-anchor">
                <div class="bio-card-glass">
                    <h2 style="margin-top: 40px;">BIO CARD</h2>
                    <p style="opacity: 0.6;">Scroll down to see refraction</p>
                    
                    <div style="margin-top: auto;">
                        <div style="font-size: 10px; opacity: 0.5; margin-bottom: 5px;">STATUS</div>
                        <div style="font-weight: bold;">ENCRYPTED</div>
                    </div>

                    <div class="bottom-tabs">
                        <div class="tab-item" onclick="jiggle(this)">🏠</div>
                        <div class="tab-item" onclick="jiggle(this)">🔍</div>
                        <div class="tab-item" onclick="jiggle(this)">👤</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div style="padding: 40px; text-align: center;">
                <img src="/assets/ndlogo.svg" style="height: 60px; filter: invert(1);">
                <h1>liquidGL</h1>
                <p>High Performance WebGL Glassmorphism</p>
                <button style="padding: 15px 40px; border-radius: 50px; border: none; background: #000; color: #fff; cursor: pointer; font-weight: bold;">Unlock Now</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="/scripts/html2canvas.min.js"></script>
    <script src="/scripts/liquidGL.js"></script>

    <script>
        function jiggle(el) {
            el.classList.remove('jiggle');
            void el.offsetWidth; // Trigger reflow
            el.classList.add('jiggle');
        }

        document.addEventListener("DOMContentLoaded", () => {
            // 1. liquidGL Setup
            const glass = liquidGL({
                target: ".bio-card-glass",
                snapshot: "#left-col", // Wichtig: Woher das Bild für das Glas kommt
                frost: 1.5,
                refraction: 0.04,
                bevelWidth: 0.15,
                bevelDepth: 0.12,
                tilt: true,
                tiltFactor: 15,
                shadow: true,
                specular: true
            });

            // 2. Lenis Smooth Scroll
            const lenis = new Lenis({
                wrapper: document.querySelector("#left-col"),
                content: document.querySelector("#left-col")
            });

            function raf(time) {
                lenis.raf(time);
                requestAnimationFrame(raf);
            }
            requestAnimationFrame(raf);

            // 3. Sync LiquidGL mit Scrollen
            liquidGL.syncWith({ lenis: lenis });
        });
    </script>
</body>
</html>
