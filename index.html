<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marlin | Pro Glass</title>
    
    <style>
        :root {
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #ffffff;
            --subtext: #86868b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- BACKGROUND DYNAMICS --- */
        .orb-bg {
            position: fixed; inset: 0; z-index: -1; filter: blur(100px);
        }
        .orb {
            position: absolute; width: 60vw; height: 60vw; border-radius: 50%; opacity: 0.4;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(30%, 20%); }
        }

        /* --- CONTENT --- */
        main {
            width: 100%;
            max-width: 440px;
            padding: 80px 20px 140px;
        }

        /* --- SELECTION PILL (Segmented Control) --- */
        .pill-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 4px;
            border-radius: 20px;
            display: flex;
            margin-bottom: 30px;
            position: relative;
        }
        .pill-item {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--subtext);
            cursor: pointer;
            z-index: 2;
            transition: color 0.3s;
        }
        .pill-item.active { color: white; }
        
        .pill-selector {
            position: absolute;
            top: 4px; left: 4px;
            width: calc(33.33% - 4px);
            height: calc(100% - 8px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        /* --- GLASS CARDS --- */
        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
        }

        h1 { font-size: 34px; font-weight: 700; margin-bottom: 5px; }
        .subtitle { color: var(--subtext); margin-bottom: 30px; }

        /* --- NAVBAR --- */
        .nav-anchor {
            position: fixed;
            bottom: 30px;
            width: calc(100% - 40px);
            max-width: 400px;
            z-index: 1000;
        }
        .nav-glass {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            position: relative;
        }

        .nav-btn {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--subtext); cursor: pointer; transition: 0.3s;
        }
        .nav-btn.active { color: white; }
        .nav-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .nav-btn span { font-size: 10px; font-weight: 500; }

        /* Jiggle Animation */
        @keyframes jiggle {
            0% { transform: scale(1); }
            40% { transform: scale(1.2) translateY(-5px); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .jiggle { animation: jiggle 0.4s ease-out; }

    </style>
</head>
<body>

    <div class="orb-bg">
        <div class="orb" style="background: #4400ff; top: -10%; left: -10%;"></div>
        <div class="orb" style="background: #ff0055; bottom: 10%; right: -10%; animation-delay: -5s;"></div>
    </div>

    <main>
        <header>
            <h1>Marlin</h1>
            <p class="subtitle">Mobile App Developer</p>
        </header>

        <div class="pill-container glass-pill-target">
            <div class="pill-selector" id="pill-selector"></div>
            <div class="pill-item active" onclick="movePill(0, this)">Overview</div>
            <div class="pill-item" onclick="movePill(1, this)">Projects</div>
            <div class="pill-item" onclick="movePill(2, this)">About</div>
        </div>

        <div class="glass-card liquid-target">
            <h3 style="margin-bottom: 10px;">Status</h3>
            <p style="color: var(--subtext); font-size: 14px;">Aktuell fokussiert auf High-End WebGL Interfaces.</p>
        </div>

        <div class="glass-card liquid-target" style="height: 200px; display: flex; align-items: center; justify-content: center;">
            <p style="opacity: 0.2;">Content Area</p>
        </div>
    </main>

    <div class="nav-anchor">
        <div class="nav-glass navbar-liquid">
            <div class="nav-btn active" onclick="handleNav(this)">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>Home</span>
            </div>
            <div class="nav-btn" onclick="handleNav(this)">
                <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
                <span>Apps</span>
            </div>
            <div class="nav-btn" onclick="handleNav(this)">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                <span>Social</span>
            </div>
        </div>
    </div>

    <script src="/scripts/html2canvas.min.js"></script>
    <script src="/scripts/liquidGL.js"></script>

    <script>
        // Auswahlpille Logik
        function movePill(index, el) {
            const selector = document.getElementById('pill-selector');
            selector.style.transform = `translateX(${index * 100}%)`;
            
            document.querySelectorAll('.pill-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        // Navbar Logik & Jiggle
        function handleNav(el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            
            el.classList.remove('jiggle');
            void el.offsetWidth;
            el.classList.add('jiggle');
        }

        // liquidGL
        window.addEventListener('DOMContentLoaded', () => {
            // Die Haupt-Karten
            liquidGL({
                target: ".liquid-target",
                snapshot: ".orb-bg",
                refraction: 0.04,
                frost: 0.1,
                bevelWidth: 0.1,
                tilt: true
            });

            // Die Navbar - extra glasig
            liquidGL({
                target: ".navbar-liquid",
                snapshot: ".orb-bg",
                refraction: 0.02,
                frost: 0.4,
                bevelWidth: 0.2,
                shadow: true
            });

            // Die Auswahlpille
            liquidGL({
                target: ".glass-pill-target",
                refraction: 0.01,
                frost: 0.6
            });
        });
    </script>
</body>
</html>
