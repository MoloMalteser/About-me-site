<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio | liquidGL App Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-color: #0c0d12;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --active-icon: #f53d83; /* Vom Home-Icon */
        --inactive-icon: #a1a1aa;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background-color: var(--bg-color);
        color: white;
        overflow-x: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* ===== APP CONTAINER (Simuliert iOS Rahmen) ===== */
      .app-container {
        width: 380px;
        height: 700px;
        border-radius: 40px;
        background: #000;
        border: 4px solid #1c1c1e;
        position: relative;
        overflow: hidden;
        box-shadow: 0 40px 100px rgba(0,0,0,0.8);
      }

      /* iOS Statusbar */
      .status-bar {
        position: absolute;
        top: 0; width: 100%; height: 30px;
        display: flex; justify-content: space-between; align-items: center;
        padding: 0 20px; z-index: 1001; font-size: 12px; opacity: 0.8;
      }

      /* ===== BUNTES HINTERGRUND-MUSTER (für Refraktion) ===== */
      .background-colorful {
        position: absolute;
        inset: -50px; /* Leicht größer für Blur */
        z-index: -1;
        background: 
            radial-gradient(circle at 10% 20%, #ff0055 0%, transparent 35%),
            radial-gradient(circle at 90% 10%, #00ffee 0%, transparent 35%),
            radial-gradient(circle at 50% 80%, #ffcc00 0%, transparent 40%),
            radial-gradient(circle at 30% 60%, #8b5cf6 0%, transparent 45%),
            radial-gradient(circle at 70% 40%, #2ecc71 0%, transparent 45%);
        filter: blur(50px);
        opacity: 0.7;
      }

      /* ===== DYNAMISCHE BIO-KARTE (liquidGL Target) ===== */
      .bio-card-app {
        width: calc(100% - 40px);
        height: calc(100% - 150px);
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -60%);
        border-radius: 30px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
        box-sizing: border-box;
        text-align: center;
        
        /* Glassmorphism Details */
        background: var(--glass);
        backdrop-filter: blur(1px); /* Minimale Trübung für liquidGL */
        border: 1px solid var(--glass-border);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      }

      /* Bio Content Details */
      .avatar {
        width: 110px; height: 110px; border-radius: 50%;
        background: url('https://liquidgl.naughtyduk.com/assets/naughtyduk-logo.svg') center/cover;
        margin-bottom: 25px;
        border: 2px solid white;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      }

      h2 { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
      p { font-size: 14px; color: #a1a1aa; line-height: 1.5; margin-bottom: 30px; }

      .links {
        width: 100%; display: flex; flex-direction: column; gap: 15px;
        margin-top: auto;
      }

      .link-btn {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid var(--glass-border);
        color: white; padding: 15px; border-radius: 15px;
        text-decoration: none; font-weight: 600;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .link-btn:hover {
        background: white; color: black;
        transform: scale(1.05);
      }

      /* Jiggle Animation von der Tabbar */
      .link-btn.jiggle { animation: jiggle-btn-anim 0.4s ease-in-out; }
      @keyframes jiggle-btn-anim {
        0% { transform: scale(1.05); }
        30% { transform: scale(1.2) rotate(5deg); }
        60% { transform: scale(1) rotate(-5deg); }
        100% { transform: scale(1.05); }
      }

      /* ===== APP-STYLE BOTTOM NAVBAR (vom iOS-Screenshot) ===== */
      .app-navbar {
        position: absolute; bottom: 20px; left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 30px);
        height: 70px;
        background: var(--glass);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 35px;
        display: flex; justify-content: space-around; align-items: center;
        padding: 0 10px; z-index: 1000;
      }

      .nav-item {
        display: flex; flex-direction: column; align-items: center;
        gap: 2px; color: var(--inactive-icon);
        cursor: pointer; position: relative;
        transition: color 0.3s ease;
      }

      .nav-item.active { color: var(--active-icon); }

      .nav-icon { width: 24px; height: 24px; }
      .nav-label { font-size: 10px; font-weight: 600; }

      /* Indicator Dot für aktive App */
      .nav-item.active::after {
        content: '';
        position: absolute; bottom: -8px; left: 50%;
        transform: translateX(-50%);
        width: 4px; height: 4px;
        background-color: var(--active-icon);
        border-radius: 50%;
      }
    </style>
  </head>
  <body>

    <div class="app-container">
      
      <div class="status-bar">
        <div>9:41</div>
        <div style="display:flex; gap: 3px;">
          <span>📶</span><span>🔋</span>
        </div>
      </div>

      <div class="background-colorful"></div>

      <div class="bio-card-app">
        <div class="avatar"></div>
        <h2>NaughtyDuk©</h2>
        <p>Digital Creator & Developer.<br>Exploring the limits of WebGL.</p>
        
        <div class="links">
          <a href="#" class="link-btn active" onclick="jiggleButton(this)">Instagram</a>
          <a href="#" class="link-btn" onclick="jiggleButton(this)">GitHub</a>
          <a href="#" class="link-btn" onclick="jiggleButton(this)">Twitter</a>
        </div>
      </div>

      <nav class="app-navbar">
        <div class="nav-item active">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Home</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">⏹</span>
          <span class="nav-label">New</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">📡</span>
          <span class="nav-label">Radio</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">🎵</span>
          <span class="nav-label">Library</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">🔍</span>
          <span class="nav-label">Search</span>
        </div>
      </nav>

    </div>

    <script src="/scripts/html2canvas.min.js"></script>
    <script src="/scripts/liquidGL.js"></script>

    <script>
      function jiggleButton(el) {
        el.classList.remove('jiggle');
        void el.offsetWidth; // Trigger reflow
        el.classList.add('jiggle');
      }

      document.addEventListener("DOMContentLoaded", () => {
        // liquidGL Effekt für die Bio-Karte initialisieren
        // Wir erhöhen die Werte, um den "Sphären"-Look der Kugel nachzuahmen
        liquidGL({
          target: ".bio-card-app",
          snapshot: ".background-colorful", // Quelle der Refraktion
          frost: 1.0,           // Mittlere Milchglas-Trübung
          refraction: 0.05,     // Starke Lichtbrechung für den Linseneffekt
          bevelWidth: 0.2,      // Dicke der Wölbung am Rand
          bevelDepth: 0.15,     // Wölbung der Kante für den Sphärenlook
          magnify: 1.15,        // Lupen-Effekt
          shadow: true,         // Echter 3D-Schattenwurf
          specular: true,       // Dezente Glanzlichter
          tilt: true,           // Auf Mausbewegung reagieren
          tiltFactor: 8         // Wie stark die Karte kippt
        });

        // Die dynamischen Elemente registrieren, damit liquidGL sie trackt
        liquidGL.registerDynamic(".status-bar");
        liquidGL.registerDynamic(".app-navbar");
      });
    </script>
  </body>
</html>
