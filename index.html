<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Marlin | Liquid Glass OS</title>
    
    <style>
        :root {
            --bg: #000000;
            --accent: #ff2d55;
            --glass-stroke: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- BACKGROUND LAYER --- */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(circle at 50% 50%, #1c1c1e 0%, #000 100%);
        }

        .ambient-blob {
            position: absolute;
            width: 80vw; height: 80vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            z-index: 2;
            pointer-events: none;
        }

        /* --- CONTENT WRAPPER --- */
        .app-view {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 60px 25px;
        }

        .hero h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin: 0; }
        .hero p { color: #8e8e93; font-size: 1.2rem; }

        /* --- ORGANIC GLASS CARDS --- */
        .glass-card {
            margin: auto 0;
            width: 100%;
            height: 200px;
            border-radius: 40px; /* Organisch rund */
            border: 1px solid var(--glass-stroke);
            position: relative;
            transition: transform 0.1s ease-out;
        }

        .card-content {
            position: absolute;
            inset: 0;
            padding: 30px;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- APPLE STYLE DOCK (TABBAR) --- */
        .dock-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 100;
        }

        /* Das Dock selbst ist ein liquidGL Target */
        .dock-glass {
            height: 75px;
            border-radius: 38px;
            border: 1px solid var(--glass-stroke);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
            position: relative;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e8e93;
            text-decoration: none;
            z-index: 20;
            transition: color 0.3s;
        }

        .tab-item.active { color: #ff2d55; }

        .tab-item img {
            width: 26px; height: 26px;
            margin-bottom: 4px;
            pointer-events: none;
        }

        /* Aktiver Hintergrund-Indikator (Pille) */
        .tab-indicator {
            position: absolute;
            height: 55px;
            width: 70px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            z-index: 15;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* Animation */
        .jiggle { animation: jiggle 0.5s ease-out; }
        @keyframes jiggle {
            0% { transform: scale(1); }
            40% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="bg-canvas">
        <div class="ambient-blob" style="background: #ff2d55; top: -10%; right: -20%;"></div>
        <div class="ambient-blob" style="background: #5856d6; bottom: -10%; left: -20%;"></div>
    </div>

    <div class="app-view">
        <div class="hero">
            <h1>Marlin</h1>
            <p>UI Experience</p>
        </div>

        <div class="glass-card" id="hero-glass">
            <div class="card-content">
                <h2 style="font-size: 24px; margin-bottom: 8px;">Adaptive Glas</h2>
                <p style="opacity: 0.6;">Berühre das Glas, um die Lichtbrechung zu spüren.</p>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <div class="dock-glass" id="dock-liquid">
            <div class="tab-indicator" id="nav-indicator"></div>
            
            <a href="#" class="tab-item active" onclick="moveNav(this, 0)">
                <img src="/assets/home.svg" alt=""><span>Home</span>
            </a>
            <a href="#" class="tab-item" onclick="moveNav(this, 1)">
                <img src="/assets/apps.svg" alt=""><span>Apps</span>
            </a>
            <a href="#" class="tab-item" onclick="moveNav(this, 2)">
                <img src="/assets/radio.svg" alt=""><span>Radio</span>
            </a>
            <a href="#" class="tab-item" onclick="moveNav(this, 3)">
                <img src="/assets/library.svg" alt=""><span>Library</span>
            </a>
        </div>
    </div>

    <script src="/scripts/html2canvas.min.js"></script>
    <script src="/scripts/liquidGL.js"></script>

    <script>
        function moveNav(el, index) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            // Indikator bewegen
            const indicator = document.getElementById('nav-indicator');
            const percent = index * 100;
            indicator.style.transform = `translateX(${el.offsetLeft - 15}px)`;
            
            // Icon Animation
            const img = el.querySelector('img');
            img.classList.add('jiggle');
            setTimeout(() => img.classList.remove('jiggle'), 500);
        }

        window.addEventListener('load', () => {
            // Initialisierung für beide Glas-Elemente
            setTimeout(() => {
                // Das Haupt-Glas (Hocheffektive Refraktion)
                liquidGL({
                    target: "#hero-glass",
                    snapshot: "#bg-canvas",
                    refraction: 0.1,
                    frost: 0.02,
                    bevelWidth: 0.2,
                    bevelDepth: 0.2,
                    specular: true,
                    tilt: true,
                    tiltFactor: 20
                });

                // Die Tabbar als reaktives Glas
                liquidGL({
                    target: "#dock-liquid",
                    snapshot: "#bg-canvas",
                    refraction: 0.05,
                    frost: 0.1,
                    bevelWidth: 0.1,
                    shadow: true
                });

                // Indikator an die erste Position setzen
                const firstTab = document.querySelector('.tab-item');
                document.getElementById('nav-indicator').style.transform = `translateX(${firstTab.offsetLeft - 15}px)`;
            }, 300);
        });
    </script>
</body>
</html>
