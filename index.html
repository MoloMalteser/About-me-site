<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Marlin | iOS Style</title>
    
    <style>
        :root {
            --bg: #050508;
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #f53d83;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Hintergrund-Layer */
        #bg-layer {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050508 100%);
        }

        .blob {
            position: absolute;
            width: 80vw;
            height: 80vw;
            filter: blur(100px);
            opacity: 0.4;
            border-radius: 50%;
            z-index: 2;
        }

        /* Content-Layer */
        .content {
            position: relative;
            z-index: 10;
            padding: 60px 25px;
            max-width: 450px;
            margin: 0 auto;
        }

        h1 { font-size: 3rem; margin: 0; }
        .sub { color: #888; font-size: 1.2rem; margin-bottom: 40px; }

        /* Das Glas-Panel */
        #glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            min-height: 150px;
            position: relative;
            /* WICHTIG: Kein opacity:0 hier, sonst sieht html2canvas nichts! */
        }

        /* Navbar - Echte Assets Pfade */
        .nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            color: #666;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
        }

        .nav-item img {
            width: 24px;
            height: 24px;
            display: block;
            margin: 0 auto 5px;
            filter: grayscale(1);
        }

        .nav-item.active { color: var(--accent); }
        .nav-item.active img { filter: grayscale(0) drop-shadow(0 0 5px var(--accent)); }

        .jiggle { animation: jiggle 0.4s ease; }
        @keyframes jiggle {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="bg-layer">
        <div class="blob" style="background: #f53d83; top: -10%; left: -20%;"></div>
        <div class="blob" style="background: #4400ff; bottom: -10%; right: -20%;"></div>
    </div>

    <div class="content">
        <h1>Marlin</h1>
        <div class="sub">Mobile App Developer</div>

        <div id="glass-panel">
            <h2 style="margin:0 0 10px 0;">Status</h2>
            <p style="color:#aaa; margin:0;">liquidGL ist aktiv. Hintergrund wird gebrochen.</p>
        </div>
    </div>

    <nav class="nav">
        <a href="#" class="nav-item active" onclick="clickNav(this)">
            <img src="/assets/home.svg" alt="Home"> Home
        </a>
        <a href="#" class="nav-item" onclick="clickNav(this)">
            <img src="/assets/apps.svg" alt="Apps"> Apps
        </a>
        <a href="#" class="nav-item" onclick="clickNav(this)">
            <img src="/assets/social.svg" alt="Social"> Social
        </a>
    </nav>

    <script src="/scripts/html2canvas.min.js"></script>
    <script src="/scripts/liquidGL.js"></script>

    <script>
        function clickNav(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            el.querySelector('img').classList.add('jiggle');
            setTimeout(() => el.querySelector('img').classList.remove('jiggle'), 400);
        }

        // Wir warten, bis alles (auch die SVGs) geladen ist
        window.onload = () => {
            setTimeout(() => {
                const glass = liquidGL({
                    target: "#glass-panel",
                    snapshot: "#bg-layer", // NUR den Hintergrund fotografieren!
                    refraction: 0.05,
                    frost: 0.12,
                    bevelDepth: 0.1,
                    shadow: true,
                    tilt: true
                });
            }, 300); // Kleiner Puffer für mobile Browser
        };
    </script>
</body>
</html>
