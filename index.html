<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marlin | App Experience</title>
    
    <style>
        :root {
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #f53d83;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- BACKGROUND BLOBS (Für die Brechung im Glas) --- */
        .blob-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            filter: blur(80px);
        }
        .blob {
            position: absolute;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            opacity: 0.6;
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* --- CONTENT AREA --- */
        main {
            padding: 20px;
            padding-bottom: 120px; /* Platz für Navbar */
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            padding: 60px 0 30px;
            text-align: center;
        }

        .avatar-wrap {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 30px;
            background: url('/assets/ndlogo.svg') center/cover;
            border: 1px solid var(--glass-border);
        }

        /* --- GLASS CARDS (liquidGL Targets) --- */
        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .glass-panel h2 { font-size: 1.2rem; margin-bottom: 8px; font-weight: 600; }
        .glass-panel p { font-size: 0.95rem; color: #a1a1aa; }

        /* --- IOS STYLE LINKS --- */
        .action-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .action-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: background 0.2s;
        }
        .action-item:active { background: rgba(255, 255, 255, 0.15); transform: scale(0.98); }

        /* --- BOTTOM NAVBAR (Apple Music Style) --- */
        .nav-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 1000;
        }
        .nav-bar {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 5px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #888;
            cursor: pointer;
            flex: 1;
            transition: color 0.3s;
        }
        .nav-btn.active { color: var(--accent); }
        .nav-btn span { font-size: 10px; font-weight: 600; }
        .nav-icon { font-size: 20px; }

        /* Jiggle Animation */
        .jiggle { animation: jiggle-anim 0.4s ease-out; }
        @keyframes jiggle-anim {
            0% { transform: scale(1); }
            30% { transform: scale(1.4) rotate(8deg); }
            50% { transform: scale(0.9) rotate(-8deg); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="blob-container">
        <div class="blob" style="background: #f53d83; top: 10%; left: -10%;"></div>
        <div class="blob" style="background: #4400ff; bottom: 10%; right: -10%; animation-delay: -5s;"></div>
    </div>

    <main>
        <header>
            <div class="avatar-wrap">
                <div class="avatar-img"></div>
            </div>
            <h1>Marlin</h1>
            <p style="color: #888;">Student & Developer</p>
        </header>

        <div class="glass-panel liquid-target">
            <h2>Aktuelles Projekt</h2>
            <p>Entwicklung von immersiven Web-Interfaces mit liquidGL und Swift-Inspiration.</p>
            
            <div class="action-list">
                <a href="#" class="action-item">
                    <span>Portfolio ansehen</span>
                    <span style="opacity: 0.3;">→</span>
                </a>
                <a href="#" class="action-item">
                    <span>GitHub Repos</span>
                    <span style="opacity: 0.3;">→</span>
                </a>
            </div>
        </div>

        <div class="glass-panel liquid-target">
            <h2>Über mich</h2>
            <p>Fasziniert von minimalistischem Design und High-Performance Code.</p>
        </div>
    </main>

    <div class="nav-container">
        <div class="nav-bar">
            <div class="nav-btn active" onclick="handleNav(this)">
                <div class="nav-icon">🏠</div>
                <span>Home</span>
            </div>
            <div class="nav-btn" onclick="handleNav(this)">
                <div class="nav-icon">⏹</div>
                <span>Projects</span>
            </div>
            <div class="nav-btn" onclick="handleNav(this)">
                <div class="nav-icon">📡</div>
                <span>Socials</span>
            </div>
            <div class="nav-btn" onclick="handleNav(this)">
                <div class="nav-icon">🔍</div>
                <span>Search</span>
            </div>
        </div>
    </div>

    <script src="/scripts/html2canvas.min.js"></script>
    <script src="/scripts/liquidGL.js"></script>

    <script>
        // Nav Logic & Jiggle
        function handleNav(el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            
            const icon = el.querySelector('.nav-icon');
            icon.classList.remove('jiggle');
            void icon.offsetWidth; // Reflow
            icon.classList.add('jiggle');
        }

        // liquidGL Init
        window.addEventListener('DOMContentLoaded', () => {
            liquidGL({
                target: ".liquid-target",
                snapshot: ".blob-container", // Glas bricht den farbigen Hintergrund
                refraction: 0.04,
                bevelDepth: 0.1,
                bevelWidth: 0.1,
                frost: 0.15,
                shadow: true,
                specular: true,
                tilt: true,
                tiltFactor: 10
            });

            // Falls die Navbar auch liquidGL sein soll (optional):
            liquidGL({ target: ".nav-bar", refraction: 0.02, frost: 0.5 });
        });
    </script>
</body>
</html>
