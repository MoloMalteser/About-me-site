<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Marlin | Liquid UI</title>
    
    <style>
        :root {
            --bg: #020205;
            --accent: #f53d83;
            --glass-stroke: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden;
            height: 100svh;
        }

        /* --- LAYER 1: DER HINTERGRUND (Wird vom Glas gebrochen) --- */
        #canvas-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(145deg, #050508 0%, #0f0f1a 100%);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: 2;
        }

        /* --- LAYER 2: DAS GLAS (liquidGL Target) --- */
        .glass-container {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #main-glass {
            width: 90%;
            max-width: 400px;
            height: 220px;
            border-radius: 35px;
            border: 1px solid var(--glass-stroke);
            pointer-events: auto;
            /* Wir lassen es leer für das Skript */
        }

        /* --- LAYER 3: UI & TEXT (Immer scharf, über dem Glas) --- */
        .ui-layer {
            position: relative;
            z-index: 10;
            height: 100svh;
            display: flex;
            flex-direction: column;
            padding: 60px 30px;
            pointer-events: none;
        }

        .header { pointer-events: auto; }
        .header h1 { font-size: 3.2rem; font-weight: 860; letter-spacing: -1.5px; margin: 0; }
        .header p { font-size: 1.2rem; color: #8a8a8e; font-weight: 500; }

        /* Das Infofeld sitzt genau über dem Glas */
        .glass-content {
            margin-top: auto;
            margin-bottom: auto;
            padding: 30px;
            max-width: 400px;
            align-self: center;
            text-align: left;
            pointer-events: auto;
        }

        /* --- IOS NAVBAR --- */
        .tab-bar-wrap {
            position: fixed;
            bottom: 30px;
            left: 0; width: 100%;
            display: flex; justify-content: center;
            z-index: 100;
        }

        .tab-bar {
            width: 90%; max-width: 380px;
            background: rgba(25, 25, 30, 0.6);
            backdrop-filter: blur(25px) saturate(1.8);
            -webkit-backdrop-filter: blur(25px) saturate(1.8);
            border-radius: 40px;
            border: 0.5px solid var(--glass-stroke);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 12px 10px;
        }

        .tab-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: #8e8e93; font-size: 10px; font-weight: 600;
            cursor: pointer;
        }

        .tab-item.active { color: white; }

        .tab-item img {
            width: 26px; height: 26px; margin-bottom: 4px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tab-item:active img { transform: scale(0.85); }
        .jiggle { animation: jiggle 0.45s ease-out; }

        @keyframes jiggle {
            0% { transform: scale(1); }
            40% { transform: scale(1.4) translateY(-5px); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="canvas-bg">
        <div class="blob" style="background: #f53d83; width: 300px; height: 300px; top: 10%; right: -50px;"></div>
        <div class="blob" style="background: #5e5ce6; width: 400px; height: 400px; bottom: 5%; left: -100px;"></div>
    </div>

    <div class="glass-container">
        <div id="main-glass"></div>
    </div>

    <div class="ui-layer">
        <div class="header">
            <h1>Marlin</h1>
            <p>Mobile App Developer</p>
        </div>

        <div class="glass-content">
            <h2 style="font-size: 22px; margin-bottom: 8px;">Über Mich</h2>
            <p style="color: #bcbcbc; font-size: 15px;">Ich erstelle High-End Interfaces mit Fokus auf WebGL und iOS Design-Prinzipien.</p>
        </div>
    </div>

    <div class="tab-bar-wrap">
        <nav class="tab-bar">
            <a href="#" class="tab-item active" onclick="nav(this)">
                <img src="/assets/home.svg" alt="Home"><span>Home</span>
            </a>
            <a href="#" class="tab-item" onclick="nav(this)">
                <img src="/assets/apps.svg" alt="Apps"><span>Apps</span>
            </a>
            <a href="#" class="tab-item" onclick="nav(this)">
                <img src="/assets/social.svg" alt="Social"><span>Social</span>
            </a>
        </nav>
    </div>

    <script src="/scripts/html2canvas.min.js"></script>
    <script src="/scripts/liquidGL.js"></script>

    <script>
        function nav(el) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            const img = el.querySelector('img');
            img.classList.add('jiggle');
            setTimeout(() => img.classList.remove('jiggle'), 450);
        }

        window.addEventListener('load', () => {
            // Wir nutzen einen kleinen Timeout, damit die Engine Zeit zum Atmen hat
            setTimeout(() => {
                const glass = liquidGL({
                    target: "#main-glass",
                    snapshot: "#canvas-bg", // NUR den Hintergrund brechen!
                    refraction: 0.06,      // Schöne, starke Brechung
                    frost: 0.05,           // Fast klares Glas für modernen Look
                    bevelWidth: 0.1,
                    bevelDepth: 0.12,
                    shadow: true,
                    specular: true,
                    tilt: true,
                    tiltFactor: 12
                });
            }, 200);
        });
    </script>
</body>
</html>
